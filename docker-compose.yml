version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: leave-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: leaveappointmentmanagementsystem
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - leave-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: leave-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URL: mongodb://mongodb:27017/leaveappointmentmanagementsystem
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - leave-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: leave-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - leave-network

volumes:
  mongo-data:
    driver: local

networks:
  leave-network:
    driver: bridge
